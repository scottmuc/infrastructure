resources:
- name: bootstrapped-skopeo
  type: registry-image
  icon: docker
  source:
    repository: zot.scottmuc.com/skopeo
    tag: latest


- name: upstream-busybox
  type: registry-image
  icon: docker
  source:
    repository: docker.io/library/busybox
    tag: latest


- name: vendored-busybox
  type: registry-image
  icon: docker
  source:
    repository: zot.scottmuc.com/busybox
    tag: latest


- name: cachix-flakes
  type: registry-image
  icon: docker
  source:
    repository: zot.scottmuc.com/cachix-flakes
    tag: latest


- name: infrastructure
  type: git
  icon: github
  source:
    uri: https://github.com/scottmuc/infrastructure.git
    branch: main

jobs:
- name: baseline
  public: true

  plan:
  - get: upstream-busybox
    params:
      format: oci

  - put: vendored-busybox
    params:
      image: upstream-busybox/image.tar


- name: skopeo-convert-to-oci-archive
  public: true

  plan:
  - get: bootstrapped-skopeo
  - get: upstream-busybox
    params:
      format: oci

  - task: convert
    image: bootstrapped-skopeo
    config:
      platform: linux
      inputs:
        - name: upstream-busybox
      outputs:
        - name: converted
      run:
        path: skopeo
        args:
          - copy
          - --format=oci
          - docker-archive:upstream-busybox/image.tar
          - oci-archive:converted/image.tar:latest

  - put: vendored-busybox
    params:
      image: converted/image.tar


- name: skopeo-convert-to-docker-archive
  public: true

  plan:
  - get: bootstrapped-skopeo
  - get: upstream-busybox
    params:
      format: oci

  - task: convert
    image: bootstrapped-skopeo
    config:
      platform: linux
      inputs:
        - name: upstream-busybox
      outputs:
        - name: converted
      run:
        path: skopeo
        args:
          - copy
          - --format=oci
          - docker-archive:upstream-busybox/image.tar
          - docker-archive:converted/image.tar

  - put: vendored-busybox
    params:
      image: converted/image.tar


- name: skopeo-convert-to-oci-layout
  public: true

  plan:
  - get: bootstrapped-skopeo
  - get: upstream-busybox
    params:
      format: oci

  - task: convert
    image: bootstrapped-skopeo
    config:
      platform: linux
      inputs:
        - name: upstream-busybox
      outputs:
        - name: converted
      run:
        path: skopeo
        args:
          - copy
          - --format=oci
          - docker-archive:upstream-busybox/image.tar
          - oci:converted/oci

  - put: vendored-busybox
    params:
      image: converted/oci



- name: build-and-push-nix-image
  public: true

  plan:
  - get: infrastructure
  - get: bootstrapped-skopeo
  - get: cachix-flakes

  - task: build-image
    image: cachix-flakes
    config:
      platform: linux
      inputs:
      - name: infrastructure
      outputs:
      - name: result
      run:
        path: sh
        args:
          - -c
          - |
              nix --extra-experimental-features "nix-command flakes" \
              build ./infrastructure#test-image -o result/image
              # Create a local filesystem reference because /nix/store
              # doesn't persist across steps.
              cp result/image result/image.tar.gz
              (cd result && gunzip image.tar.gz)

  - task: convert
    image: bootstrapped-skopeo
    config:
      platform: linux
      inputs:
      - name: result
      outputs:
        - name: converted
      run:
        path: skopeo
        args:
          - copy
          - --format=oci
          - docker-archive:result/image.tar
          - oci:converted/oci

  - put: vendored-busybox
    params:
      image: converted/oci
